{% extends 'common/case_form.html' %}

{% block form %}
<form method="post" action="{% url sitemap.current_platform_page.url_name case.id %}" enctype="multipart/form-data">
    {% csrf_token %}
    {% include 'common/form_errors.html' with errors=form.non_field_errors %}
    <div class="govuk-grid-row">
        <div class="govuk-grid-column-full">
            {% block formfields %}
            {% include 'common/amp_form_snippet.html' %}
            {% endblock %}
        </div>
    </div>
    {% block formbuttons %}
        <div class="govuk-grid-row">
            <div class="govuk-grid-column-full govuk-button-group">
                <input
                    type="submit"
                    value="Save and return"
                    name="save_return"
                    class="govuk-button"
                    data-module="govuk-button"
                />
                <a
                    href="{% url 'cases:document-list' case.id %}"
                    class="govuk-link govuk-link--no-visited-state"
                >
                    Cancel
                </a>
            </div>
        </div>
    {% endblock %}
</form>
{% endblock %}
